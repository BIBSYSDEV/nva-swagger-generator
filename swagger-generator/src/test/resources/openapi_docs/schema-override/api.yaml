openapi: "3.0.1"
info:
  title: "Schema Override API"
  description: "API for testing schema override from GitHub"
  version: "1.0.0"
servers:
  - url: "https://api.sandbox.nva.aws.unit.no/{basePath}"
    variables:
      basePath:
        default: "schema-override"
paths:
  /resource:
    get:
      tags:
        - "external"
      summary: "Get resource"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
components:
  schemas:
    ResourceResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
  securitySchemes:
    CognitoUserPool:
      type: "apiKey"
      name: "Authorization"
      in: "header"
      x-amazon-apigateway-authtype: "cognito_user_pools"
