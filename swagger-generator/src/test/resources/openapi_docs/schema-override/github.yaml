openapi: 3.0.3
info:
  title: Schema Override API
  description: API for testing schema override from GitHub
  version: "1.0.0"
paths:
  /resource:
    get:
      tags:
        - external
      summary: Get resource
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
components:
  schemas:
    ResourceResponse:
      type: object
      properties:
        id:
          type: string
          example: "12345"
        name:
          type: string
          example: "Test Resource"
  securitySchemes:
    CognitoUserPool:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
