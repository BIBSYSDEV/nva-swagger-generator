<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NVA API documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        max-width: 48rem;
        margin: 0 auto;
        padding: 2rem 1rem;
        color: #3b4151;
        line-height: 1.5;
        background: #f4f6f8;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 0.25rem;
      }
      p {
        color: #4a5568;
        margin-top: 0;
      }
      ul {
        list-style: none;
        padding: 0;
        margin-top: 1.5rem;
      }
      li {
        margin: 0.6rem 0;
      }
      a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 1.1rem;
        background: #ffffff;
        border: 1px solid #d8dde6;
        border-radius: 8px;
        text-decoration: none;
        color: #1f6feb;
        font-weight: 600;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease,
          transform 0.05s ease;
      }
      a::after {
        content: "›";
        color: #9aa4b2;
        font-size: 1.4rem;
        line-height: 1;
      }
      a:hover {
        border-color: #1f6feb;
        box-shadow: 0 2px 10px rgba(31, 111, 235, 0.18);
      }
      a:hover::after {
        color: #1f6feb;
      }
      a:active {
        transform: translateY(1px);
      }
      .status {
        color: #9aa4b2;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NVA API documentation</h1>
      <p>
        OpenAPI documentation for NVA's services, one specification per service.
        Select a service to view its API. You can also switch between services
        from the dropdown at the top of each documentation page.
      </p>
      <ul id="api-list">
        <li class="status">Loading available services...</li>
      </ul>
    </main>
    <script>
      fetch("./apis.json")
        .then(function (response) {
          return response.json();
        })
        .then(function (apis) {
          var list = document.getElementById("api-list");
          list.innerHTML = "";
          if (!apis.length) {
            var empty = document.createElement("li");
            empty.className = "status";
            empty.textContent = "No services available.";
            list.appendChild(empty);
            return;
          }
          apis.forEach(function (api) {
            var item = document.createElement("li");
            var link = document.createElement("a");
            link.href = "api.html?api=" + encodeURIComponent(api.name);
            link.textContent = api.name;
            item.appendChild(link);
            list.appendChild(item);
          });
        });
    </script>
  </body>
</html>
