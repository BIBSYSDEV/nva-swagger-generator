openapi: 3.0.3
info:
  title: Schema Override API
  description: API for testing schema override from GitHub
  version: '1.0.0'
paths:
  /resource:
    get:
      tags:
        - external
      summary: Get resource
      parameters:
        - name: "id"
          in: "query"
          example: "12345"
          schema:
            type: "string"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/some-function
        httpMethod: POST
        type: AWS_PROXY
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
              examples:
                sampleResource:
                  summary: "A sample resource"
                  value:
                    id: "12345"
                    name: "Test Resource"
components:
  schemas:
    ResourceResponse:
      type: object
      properties:
        id:
          type: string
          example: "12345"
        name:
          type: string
          example: "Test Resource"
  securitySchemes:
    CognitoUserPool:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
